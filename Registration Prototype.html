<!DOCTYPE html>

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MMF — Бүртгэл &amp; нэвтрэлтийн прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet"/>
<style>
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; }
  body {
    font-family: 'Manrope', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background:
      radial-gradient(1200px 600px at 20% 0%, #EEF0FE 0%, transparent 60%),
      radial-gradient(1000px 500px at 80% 100%, #FFEDE2 0%, transparent 60%),
      #F6F7FB;
    min-height: 100vh; color: #0B1020;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  button, input { font-family: inherit; }
  *::-webkit-scrollbar { width: 0; height: 0; }
  * { scrollbar-width: none; }

  /* the scaled phone host */
  .rp-host { transition: transform .15s ease; }
  /* hide the Frame's monospace artboard label so only the device shows */
  .rp-screen > div > :first-child { display: none !important; }

  /* animation helpers reused by the real screens */
  @keyframes omf-spin { to { transform: rotate(360deg); } }
  .omf-spin { animation: omf-spin 0.9s linear infinite; }
  @keyframes omf-pulse { 0% { transform: scale(.7); opacity:.7; } 70% { transform: scale(1.5); opacity:0; } 100% { opacity:0; } }
  .omf-pulse { animation: omf-pulse 2s cubic-bezier(.2,.8,.2,1) infinite; }
  .omf-pulse-2 { animation-delay: 1s; }
</style>
</head>
